name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --repo ${{ github.repository }}

  publish:
    name: Publish for ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash  # ✅ Force bash partout pour éviter les erreurs PowerShell
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Binary (Unix)
        if: runner.os != 'Windows'
        run: |
          tar czf strung-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release strung

      - name: Package Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          # ✅ On utilise une syntaxe compatible bash même sur Windows
          7z a strung-${{ matrix.target }}.zip ./target/${{ matrix.target }}/release/strung.exe

      - name: Upload Binary to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} strung-${{ matrix.target }}.* \
            --repo ${{ github.repository }}
